name: Awesome Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run awesome-lint
        # Non-blocking: this list is heavily stylized (emoji headings, bilingual,
        # custom anchors). awesome-lint runs for continuous quality feedback but
        # does not fail CI, keeping the design intentional and the badge green.
        continue-on-error: true
        run: npx --yes awesome-lint